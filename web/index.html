<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>LLM Output Audit</title>
  <link rel="stylesheet" href="/assets/app.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">LOA</div>
        <div>
          <div class="brand-title">LLM Output Audit</div>
          <div class="brand-subtitle">查幻觉 · 看证据 · 保守修订</div>
        </div>
      </div>

      <div class="panel compact">
        <div class="panel-label">审查模式</div>
        <label class="field">
          <span>证据模式</span>
          <select id="evidenceMode">
            <option value="missing">missing：最快，演示流程</option>
            <option value="auto">auto：自动找证据</option>
            <option value="live">live：尽量联网查证</option>
          </select>
        </label>
        <label class="field">
          <span>Claim 抽取</span>
          <select id="claimExtractor">
            <option value="hybrid">hybrid：LLM + 规则兜底</option>
            <option value="rule">rule：纯规则，最快</option>
            <option value="llm">llm：只用 LLM</option>
          </select>
        </label>
        <label class="field">
          <span>最多 claims</span>
          <input id="maxClaims" type="number" min="1" max="80" value="16" />
        </label>
      </div>

      <div class="panel compact status-card">
        <div class="panel-label">当前状态</div>
        <div id="statusText" class="status-text">等待输入</div>
        <div class="mini-stats">
          <div><strong id="claimCount">0</strong><span>claims</span></div>
          <div><strong id="issueCount">0</strong><span>issues</span></div>
        </div>
      </div>
    </aside>

    <main class="workspace">
      <header class="topbar">
        <div>
          <h1>把 AI 长文放到验车台上</h1>
          <p>粘贴一段文本，后端跑 llm-output-audit v2，把 claim、证据、判定和修订文本摊开给你看。</p>
        </div>
        <button id="runBtn" class="primary-btn">开始审查</button>
      </header>

      <section class="grid">
        <div class="card input-card">
          <div class="card-header">
            <h2>原文</h2>
            <button id="sampleBtn" class="ghost-btn">填入示例</button>
          </div>
          <textarea id="inputText" spellcheck="false" placeholder="把要审查的 AI 输出粘贴到这里。建议先用一小段文本看效果，再切到 auto/live 模式跑长文。"></textarea>
        </div>

        <div class="card process-card">
          <div class="card-header">
            <h2>检查过程</h2>
            <span id="jobId" class="muted"></span>
          </div>
          <ol id="timeline" class="timeline"></ol>
        </div>
      </section>

      <section class="card result-card">
        <div class="tabs">
          <button class="tab active" data-tab="overview">总览</button>
          <button class="tab" data-tab="claims">Claims</button>
          <button class="tab" data-tab="evidence">Evidence</button>
          <button class="tab" data-tab="revision">修订文本</button>
          <button class="tab" data-tab="report">报告</button>
        </div>

        <div id="overview" class="tab-pane active">
          <div id="summaryCards" class="summary-cards"></div>
          <div id="suggestions" class="suggestions"></div>
        </div>
        <div id="claims" class="tab-pane">
          <div id="claimsList" class="list"></div>
        </div>
        <div id="evidence" class="tab-pane">
          <div id="evidenceList" class="list"></div>
        </div>
        <div id="revision" class="tab-pane split-pane">
          <div>
            <h3>原文</h3>
            <pre id="originalOut"></pre>
          </div>
          <div>
            <h3>修订后</h3>
            <pre id="revisedOut"></pre>
          </div>
        </div>
        <div id="report" class="tab-pane">
          <pre id="reportOut"></pre>
        </div>
      </section>
    </main>
  </div>

  <script src="/assets/app.js"></script>
</body>
</html>
