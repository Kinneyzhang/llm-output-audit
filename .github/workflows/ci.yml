name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate package and docs
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12']

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Compile script
        run: |
          python -m py_compile scripts/fact_check.py
          python -m py_compile scripts/install_agent_skill.py
          python -m py_compile scripts/mcp_server.py
          python -m py_compile scripts/eval_auditor.py
          python -m py_compile scripts/audit_v2.py
          python -m py_compile scripts/build_public_benchmark.py
          python -m py_compile benchmark/public/common_adapter.py benchmark/public/*/adapter.py

      - name: CLI help smoke test
        run: python scripts/fact_check.py --help

      - name: Import and router smoke test
        run: |
          python - <<'PY'
          import importlib.util
          from pathlib import Path

          spec = importlib.util.spec_from_file_location('audit', 'scripts/fact_check.py')
          audit = importlib.util.module_from_spec(spec)
          spec.loader.exec_module(audit)

          cases = [
              ('FEATURE', 'Tool Y can index local Markdown files'),
              ('REQUIREMENT', 'This package requires Python 3.10+'),
              ('COMPAT', 'Model Y works with OpenAI-compatible APIs'),
              ('WORKFLOW', 'The tool first extracts claims and then routes evidence sources'),
              ('EVAL', 'A is faster than B in benchmark X'),
          ]
          for claim_type, text in cases:
              sources = audit.route_sources(claim_type, text, max_sources=4)
              assert sources, (claim_type, text)
              score, reasons = audit.claim_importance({'type': claim_type, 'text': text})
              assert isinstance(score, int)
              assert isinstance(reasons, list)

          assert audit.github_repo_candidates('Hermes Agent has 140k GitHub Stars') == ['NousResearch/hermes-agent']
          assert audit.github_repo_candidates('Claude Code has 122k GitHub Stars') == ['anthropics/claude-code']
          assert audit.github_repo_candidates('Codex has 81k GitHub Stars') == ['openai/codex']
          assert audit.github_repo_candidates('Khoj has 34k GitHub Stars') == ['khoj-ai/khoj']
          assert audit.github_repo_candidates('GPT Researcher GitHub星标数为26.9k') == ['assafelovic/gpt-researcher']
          assert audit.github_repo_candidates('STORM GitHub星标数为28.2k') == ['stanford-oval/storm']

          for path in [
              'README.md',
              'README.zh-CN.md',
              'SKILL.md',
              'AGENTS.md',
              'CLAUDE.md',
              'docs/architecture.svg',
              'examples/smoke.md',
              'examples/demo-report.md',
              'templates/AGENTS.block.md.tmpl',
              'templates/CLAUDE.block.md.tmpl',
              'templates/claude-code-skill.md.tmpl',
              'templates/mcp-config.json.tmpl',
          ]:
              assert Path(path).exists(), path

          print('router_smoke_ok')
          PY

      - name: README language links
        run: |
          grep -q '\[English\](README.md) | \[简体中文\](README.zh-CN.md)' README.md
          grep -q '\[English\](README.md) | \[简体中文\](README.zh-CN.md)' README.zh-CN.md

      - name: Multi-agent installer smoke test
        run: |
          python scripts/install_agent_skill.py --agent hermes --scope user --target /tmp/loa-hermes --dry-run
          python scripts/install_agent_skill.py --agent claude-code --scope user --target /tmp/loa-claude-skill.md --dry-run
          python scripts/install_agent_skill.py --agent codex --scope project --target /tmp/loa-AGENTS.md --dry-run
          python scripts/install_agent_skill.py --agent mcp --scope project --target /tmp/loa-mcp.json --dry-run
          python scripts/install_agent_skill.py --agent claude-code --scope user --target /tmp/loa-claude-skill.md --force --no-project-instructions
          grep -q 'Canonical script' /tmp/loa-claude-skill.md
          python scripts/install_agent_skill.py --agent codex --scope project --target /tmp/loa-AGENTS.md
          python scripts/install_agent_skill.py --agent codex --scope project --target /tmp/loa-AGENTS.md
          test "$(grep -c 'llm-output-audit:start' /tmp/loa-AGENTS.md)" = "1"
          grep -q 'python3 .*scripts/fact_check.py' /tmp/loa-AGENTS.md
          python scripts/install_agent_skill.py --agent mcp --scope project --target /tmp/loa-mcp.json
          python -m json.tool /tmp/loa-mcp.json >/dev/null
          grep -q 'mcp_server.py' /tmp/loa-mcp.json

      - name: MCP server smoke test
        run: |
          python scripts/mcp_server.py --version
          python - <<'PY'
          import json, subprocess, sys, tempfile

          proc = subprocess.Popen([sys.executable, 'scripts/mcp_server.py'], stdin=subprocess.PIPE, stdout=subprocess.PIPE)

          def send(obj):
              data = json.dumps(obj).encode()
              proc.stdin.write(f'Content-Length: {len(data)}\r\n\r\n'.encode() + data)
              proc.stdin.flush()

          def recv():
              headers = {}
              while True:
                  line = proc.stdout.readline()
                  if line in (b'\r\n', b'\n'):
                      break
                  k, _, v = line.decode().partition(':')
                  headers[k.lower()] = v.strip()
              body = proc.stdout.read(int(headers['content-length']))
              return json.loads(body)

          send({'jsonrpc': '2.0', 'id': 1, 'method': 'initialize', 'params': {'protocolVersion': '2024-11-05', 'capabilities': {}, 'clientInfo': {'name': 'ci', 'version': '0'}}})
          assert recv()['result']['serverInfo']['name'] == 'llm-output-audit'
          send({'jsonrpc': '2.0', 'method': 'notifications/initialized', 'params': {}})
          send({'jsonrpc': '2.0', 'id': 2, 'method': 'tools/list', 'params': {}})
          names = [t['name'] for t in recv()['result']['tools']]
          assert {'audit_file', 'audit_text', 'audit_file_v2', 'summarize_artifacts', 'summarize_trace', 'install_snippet'} <= set(names)
          send({'jsonrpc': '2.0', 'id': 3, 'method': 'tools/call', 'params': {'name': 'install_snippet', 'arguments': {}}})
          text = recv()['result']['content'][0]['text']
          assert 'mcp_server.py' in text
          artifact_dir = tempfile.mkdtemp(prefix='loa-mcp-v2-')
          send({'jsonrpc': '2.0', 'id': 4, 'method': 'tools/call', 'params': {'name': 'audit_file_v2', 'arguments': {'file': 'benchmark/cases/public-fever-supported-caddy-go/original.md', 'output_dir': artifact_dir}}})
          audit_v2 = json.loads(recv()['result']['content'][0]['text'])
          assert audit_v2['ok'], audit_v2
          send({'jsonrpc': '2.0', 'id': 5, 'method': 'tools/call', 'params': {'name': 'summarize_artifacts', 'arguments': {'artifact_dir': artifact_dir}}})
          artifacts = json.loads(recv()['result']['content'][0]['text'])
          assert artifacts['ok'] and artifacts['counts']['claims'] == 1, artifacts
          proc.stdin.close()
          proc.terminate()
          proc.wait(timeout=5)
          print('mcp_smoke_ok')
          PY

      - name: Architecture SVG sanity check
        run: |
          grep -q '<svg' docs/architecture.svg
          grep -q 'LLM Output Audit' docs/architecture.svg

      - name: v2 benchmark scaffold smoke test
        run: |
          python scripts/build_public_benchmark.py --output /tmp/loa-public-cases --clean-public
          test -f /tmp/loa-public-cases/public-fever-supported-caddy-go/source-pack.json
          for case in /tmp/loa-public-cases/*; do
            python scripts/audit_v2.py --case "$case" --oracle --output-dir "/tmp/loa-v2-actual/$(basename "$case")"
          done
          rm -rf /tmp/loa-v2-built-native
          mkdir -p /tmp/loa-v2-built-native
          for case in /tmp/loa-public-cases/*; do
            python scripts/audit_v2.py --file "$case/original.md" --output-dir "/tmp/loa-v2-built-native/$(basename "$case")"
          done
          python scripts/eval_auditor.py /tmp/loa-public-cases --actual-root /tmp/loa-v2-actual --output /tmp/loa-built-benchmark-report.md --json-output /tmp/loa-built-benchmark-report.json
          python scripts/eval_auditor.py /tmp/loa-public-cases --actual-root /tmp/loa-v2-built-native --output /tmp/loa-built-native-benchmark-report.md --json-output /tmp/loa-built-native-benchmark-report.json
          python scripts/eval_auditor.py benchmark/cases --output /tmp/loa-benchmark-report.md --json-output /tmp/loa-benchmark-report.json
          rm -rf /tmp/loa-v2-native
          mkdir -p /tmp/loa-v2-native
          for case in benchmark/cases/*; do
            python scripts/audit_v2.py --file "$case/original.md" --output-dir "/tmp/loa-v2-native/$(basename "$case")"
          done
          python scripts/eval_auditor.py benchmark/cases --actual-root /tmp/loa-v2-native --output /tmp/loa-native-benchmark-report.md --json-output /tmp/loa-native-benchmark-report.json
          python - <<'PY'
          import json
          from pathlib import Path

          built = json.loads(Path('/tmp/loa-built-benchmark-report.json').read_text())['summary']
          assert built['case_count'] == 7
          assert built['valid_case_count'] == 7
          assert built['layers'].get('public_core', 0) == 6
          assert built['layers'].get('technical_domain', 0) == 1
          assert built['actual_available_count'] == 7
          assert built['actual_metric_averages']['claim_precision'] == 1.0
          assert built['actual_metric_averages']['claim_recall'] == 1.0
          assert built['actual_metric_averages']['verdict_accuracy_on_shared_ids'] == 1.0
          assert built['actual_artifact_counts']['evidence'] == 7
          assert built['actual_artifact_counts']['review_queue'] == 7
          assert built['actual_artifact_counts']['suggestions'] == 7
          assert built['actual_artifact_counts']['manifest'] == 7

          built_native = json.loads(Path('/tmp/loa-built-native-benchmark-report.json').read_text())['summary']
          assert built_native['case_count'] == 7
          assert built_native['valid_case_count'] == 7
          assert built_native['actual_available_count'] == 7
          assert built_native['actual_metric_averages']['claim_precision'] == 1.0
          assert built_native['actual_metric_averages']['claim_recall'] == 1.0
          assert built_native['actual_metric_averages']['verdict_accuracy_on_shared_ids'] == 1.0
          assert not built_native['actual_failure_cases']
          built_profile = json.loads(Path('/tmp/loa-v2-built-native/public-fever-supported-caddy-go/article-profile.json').read_text())
          assert built_profile['source_pack'].endswith('source-pack.json')

          payload = json.loads(Path('/tmp/loa-benchmark-report.json').read_text())
          summary = payload['summary']
          assert summary['case_count'] >= 8
          assert summary['valid_case_count'] == summary['case_count']
          assert summary['layers'].get('public_core', 0) >= 6
          assert summary['layers'].get('technical_domain', 0) >= 2
          assert summary['actual_available_count'] >= 8
          assert summary['actual_metric_averages']['claim_precision'] == 1.0
          assert summary['actual_metric_averages']['claim_recall'] == 1.0
          assert summary['actual_metric_averages']['verdict_accuracy_on_shared_ids'] == 1.0
          assert not summary['actual_failure_cases']

          native = json.loads(Path('/tmp/loa-native-benchmark-report.json').read_text())['summary']
          assert native['case_count'] >= 8
          assert native['valid_case_count'] == native['case_count']
          assert native['actual_available_count'] >= 8
          assert native['actual_metric_averages']['claim_precision'] == 1.0
          assert native['actual_metric_averages']['claim_recall'] == 1.0
          assert native['actual_metric_averages']['verdict_accuracy_on_shared_ids'] == 1.0
          assert not native['actual_failure_cases']
          profile = json.loads(Path('/tmp/loa-v2-native/public-fever-supported-caddy-go/article-profile.json').read_text())
          assert profile['source_pack'].endswith('source-pack.json')
          evidence_line = Path('/tmp/loa-v2-native/public-fever-supported-caddy-go/actual-evidence.jsonl').read_text().splitlines()[0]
          assert 'benchmark_source_pack' in evidence_line
          print('v2_benchmark_smoke_ok')
          PY
